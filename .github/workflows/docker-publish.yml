name: Build and push Docker image

on:
  push:
    tags:
      - 'nvllm-v*'

env:
  GHCR_IMAGE: ghcr.io/navi-ai-lab/nvllm
  DOCKERHUB_IMAGE: docker.io/natfii/nvllm

jobs:
  build-and-push:
    runs-on: [self-hosted, linux, arm64, gb10]
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "tag=${GITHUB_REF_NAME#nvllm-}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.gb10
          platforms: linux/arm64
          push: true
          tags: |
            ${{ env.GHCR_IMAGE }}:${{ steps.version.outputs.tag }}
            ${{ env.GHCR_IMAGE }}:latest
            ${{ env.DOCKERHUB_IMAGE }}:${{ steps.version.outputs.tag }}
            ${{ env.DOCKERHUB_IMAGE }}:latest
